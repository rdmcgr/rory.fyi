name: Deploy to Bluehost

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BLUEHOST_SFTP_HOST }}
          username: ${{ secrets.BLUEHOST_SFTP_USER }}
          password: ${{ secrets.BLUEHOST_SFTP_PASS }}
          port: ${{ secrets.BLUEHOST_SFTP_PORT }}
          protocol: sftp
          server-dir: /public_html/roryfyi/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.github/**
            **/.DS_Store
