name: Deploy to Bluehost

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH (rsync)
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -az --delete --exclude='.git*' --exclude='.github/' --exclude='.DS_Store'
          path: ./
          remote_path: /public_html/roryfyi/
          remote_host: box5379.bluehost.com
          remote_user: codex
          remote_key: ${{ secrets.BLUEHOST_SSH_KEY }}
          remote_port: 22
          rsh: ssh -o IdentitiesOnly=yes
